name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  # Operator directive 2026-07-09: LOCAL-FIRST CI IS MANDATORY for compilation/tests —
  # trusted refs (pushes + same-repo PRs) run on the FlexNetOS self-hosted fleet; GitHub-hosted
  # is FALLBACK ONLY (fork PRs — repo is public — and the vars.CI_FORCE_HOSTED=1 escape hatch).
  # The `nu`/`nix` jobs deliberately STAY hosted: nix-installer-action mutates the host's Nix
  # (systemd daemon install) and must not touch the workstation's lifeos-foundation profile.
  truth_surface:
    name: Truth surface
    runs-on: ${{ vars.CI_FORCE_HOSTED == '1' && 'ubuntu-latest' || ((github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('["self-hosted","linux","x64","local","flexnetos"]') || 'ubuntu-latest') }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate repo truth surface
        run: python3 scripts/truth_surface.py --check

  rust:
    name: Rust workspace
    runs-on: ${{ vars.CI_FORCE_HOSTED == '1' && 'ubuntu-latest' || ((github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('["self-hosted","linux","x64","local","flexnetos"]') || 'ubuntu-latest') }}
    steps:
      - uses: actions/checkout@v4
      # dtolnay/rust-toolchain bootstraps rustup when absent — required on the local
      # FlexNetOS runners, whose homes ship no preinstalled rustup (hosted images do).
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all -- --check
      - name: Test workspace
        run: cargo test --workspace
      - name: Envctl inventory smoke
        run: cargo test -p nu_plugin_codedb envctl_inventory_import_rows

  nu:
    name: Nu smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - name: Syntax gate
        run: nix develop .#ci -c nu tests/test_nushell_syntax_gate.nu
      - name: Transient plugin smoke
        run: nix develop .#ci -c nu tests/test_transient_plugin.nu
      - name: Plugin registry smoke
        run: nix develop .#ci -c nu tests/test_plugin_registry.nu

  nix:
    name: Nix checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - name: Flake checks
        run: nix flake check --no-write-lock-file
