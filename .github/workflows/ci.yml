name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  mandatory_capabilities:
    name: Mandatory capabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - name: Reject optional, deferred, or GAP-closed requirements
        run: python3 -m unittest tests/test_mandatory_capability_policy.py
      - name: Prove locked context, path safety, and PostgreSQL policy
        run: python3 -m unittest tests/test_locked_context_integration.py tests/test_materialization_safety.py tests/test_postgres_open_policy.py tests/test_mandatory_pg_parity.py
      - name: Test affected crates and frontdoors
        run: cargo test -p codedb-core -p codedb-context -p codedb-cargo -p codedb -p nu_plugin_codedb -p codedb-mcp -p codedb-store-pg

  postgres_parity:
    name: PostgreSQL/redb mandatory parity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: codedb
          POSTGRES_PASSWORD: codedb
          POSTGRES_DB: codedb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codedb -d codedb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      CODEDB_PG_CONN: host=localhost port=5432 user=codedb password=codedb dbname=codedb
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - name: Run non-skipping differential backend contract
        run: cargo test -p codedb-store-pg --features pg-integration --test blobstore_parity -- --nocapture

  # Operator directive 2026-07-09: LOCAL-FIRST CI IS MANDATORY for compilation/tests —
  # trusted refs (pushes + same-repo PRs) run on the FlexNetOS self-hosted fleet; GitHub-hosted
  # is FALLBACK ONLY (fork PRs — repo is public — and the vars.CI_FORCE_HOSTED=1 escape hatch).
  # The `nu`/`nix` jobs deliberately STAY hosted: nix-installer-action mutates the host's Nix.
  truth_surface:
    name: Truth surface
    runs-on: ${{ vars.CI_FORCE_HOSTED == '1' && 'ubuntu-latest' || ((github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('["self-hosted","linux","x64","local","flexnetos"]') || 'ubuntu-latest') }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Validate repo truth surface
        run: python3 scripts/truth_surface.py --check

  rust:
    name: Rust workspace
    runs-on: ${{ vars.CI_FORCE_HOSTED == '1' && 'ubuntu-latest' || ((github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('["self-hosted","linux","x64","local","flexnetos"]') || 'ubuntu-latest') }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Rust toolchain on GitHub-hosted runners
        if: runner.environment == 'github-hosted'
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - name: Select profile-owned Rust toolchain on FlexNetOS self-hosted runners
        if: runner.environment == 'self-hosted'
        shell: bash
        run: |
          toolbin=/home/flexnetos/.nix-profile/toolbin
          test -x "$toolbin/cargo"
          test -x "$toolbin/rustc"
          echo "$toolbin" >> "$GITHUB_PATH"
          "$toolbin/cargo" --version
          "$toolbin/rustc" -Vv
      - name: Format
        run: cargo fmt --all -- --check
      - name: Test workspace
        run: cargo test --workspace
      - name: Envctl inventory smoke
        run: cargo test -p nu_plugin_codedb envctl_inventory_import_rows

  nu:
    name: Nu smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: DeterminateSystems/nix-installer-action@e50d5f73bfe71c2dd0aa4218de8f4afa59f8f81d
      - name: Run every mandatory Nu behavior gate
        run: |
          nix develop .#ci -c bash -lc '
            set -euo pipefail
            for test in tests/*.nu; do
              echo "=== $test ==="
              nu "$test"
            done
          '

  nix:
    name: Nix checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: DeterminateSystems/nix-installer-action@e50d5f73bfe71c2dd0aa4218de8f4afa59f8f81d
      - name: Flake checks
        run: nix flake check --no-write-lock-file
