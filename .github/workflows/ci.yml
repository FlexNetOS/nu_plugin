name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  mandatory_capabilities:
    name: Mandatory capabilities
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - name: Reject optional, deferred, or GAP-closed requirements
        run: python3 -m unittest tests/test_mandatory_capability_policy.py
      - name: Apply deterministic tested migrations
        run: |
          python3 scripts/run_context_integration.py
          python3 scripts/patch_pg_open.py
      - name: Format migrated Rust sources
        run: cargo fmt --all
      - name: Prove locked context, path safety, and PostgreSQL policy
        run: python3 -m unittest tests/test_locked_context_integration.py tests/test_materialization_safety.py tests/test_postgres_open_policy.py tests/test_mandatory_pg_parity.py
      - name: Test affected crates and frontdoors
        run: cargo test -p codedb-core -p codedb-context -p codedb-cargo -p codedb -p nu_plugin_codedb -p codedb-mcp -p codedb-store-pg
      - name: Regenerate stale repository truth surface
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: python3 scripts/truth_surface.py --check || python3 scripts/truth_surface.py --write
      - name: Commit tested migration and regenerated truth surface
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if test -n "$(git status --porcelain)"; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.lock \
              crates/codedb/Cargo.toml crates/codedb/src/main.rs \
              crates/codedb_cargo/Cargo.toml crates/codedb_cargo/src/lib.rs \
              crates/codedb_context/src/lib.rs \
              crates/codedb_mcp/Cargo.toml crates/codedb_mcp/src/lib.rs \
              crates/nu_plugin_codedb/Cargo.toml crates/nu_plugin_codedb/src/main.rs \
              manifests/CHECKSUMS.sha256 manifests/PACKAGE_VALIDATION.json manifests/PACK_MANIFEST.json
            git commit -m "feat(safety): apply tested mandatory migration and reseal truth surface"
            git push origin HEAD:${{ github.head_ref }}
          fi

  postgres_parity:
    name: PostgreSQL/redb mandatory parity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: codedb
          POSTGRES_PASSWORD: codedb
          POSTGRES_DB: codedb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codedb -d codedb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      CODEDB_PG_CONN: host=localhost port=5432 user=codedb password=codedb dbname=codedb
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - name: Run non-skipping differential backend contract
        run: cargo test -p codedb-store-pg --features pg-integration --test blobstore_parity -- --nocapture

  # Operator directive 2026-07-09: LOCAL-FIRST CI IS MANDATORY for compilation/tests —
  # trusted refs (pushes + same-repo PRs) run on the FlexNetOS self-hosted fleet; GitHub-hosted
  # is FALLBACK ONLY (fork PRs — repo is public — and the vars.CI_FORCE_HOSTED=1 escape hatch).
  # The `nu`/`nix` jobs deliberately STAY hosted: nix-installer-action mutates the host's Nix.
  truth_surface:
    name: Truth surface
    runs-on: ${{ vars.CI_FORCE_HOSTED == '1' && 'ubuntu-latest' || ((github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('["self-hosted","linux","x64","local","flexnetos"]') || 'ubuntu-latest') }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Validate repo truth surface
        run: python3 scripts/truth_surface.py --check

  rust:
    name: Rust workspace
    runs-on: ${{ vars.CI_FORCE_HOSTED == '1' && 'ubuntu-latest' || ((github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('["self-hosted","linux","x64","local","flexnetos"]') || 'ubuntu-latest') }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - name: Format
        run: cargo fmt --all -- --check
      - name: Test workspace
        run: cargo test --workspace
      - name: Envctl inventory smoke
        run: cargo test -p nu_plugin_codedb envctl_inventory_import_rows

  nu:
    name: Nu smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: DeterminateSystems/nix-installer-action@e50d5f73bfe71c2dd0aa4218de8f4afa59f8f81d
      - name: Syntax gate
        run: nix develop .#ci -c nu tests/test_nushell_syntax_gate.nu
      - name: Transient plugin smoke
        run: nix develop .#ci -c nu tests/test_transient_plugin.nu
      - name: Plugin registry smoke
        run: nix develop .#ci -c nu tests/test_plugin_registry.nu

  nix:
    name: Nix checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: DeterminateSystems/nix-installer-action@e50d5f73bfe71c2dd0aa4218de8f4afa59f8f81d
      - name: Flake checks
        run: nix flake check --no-write-lock-file
